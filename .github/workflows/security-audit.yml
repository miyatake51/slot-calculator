name: Security Audit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    name: セキュリティ監査
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python セットアップ（semgrep 用）
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 監査ツールの導入
        run: |
          set -euo pipefail

          # gitleaks 8.30.1
          GITLEAKS_VERSION="8.30.1"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/
          gitleaks version

          # osv-scanner 2.4.0
          OSV_VERSION="2.4.0"
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o osv-scanner
          sudo install osv-scanner /usr/local/bin/
          osv-scanner --version

          # semgrep 1.168.0
          pip install "semgrep==1.168.0"
          semgrep --version

      - name: セキュリティ監査の実行
        run: bash scripts/security-audit.sh
